name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation authentication

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate with Google Cloud using Workload Identity Federation
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # 2. Set up Google Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 3. Configure Docker to authenticate with Artifact Registry
      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      # 4. Build and Push Unified Container Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPO }}/${{ secrets.SERVICE_NAME }}:${{ github.sha }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPO }}/${{ secrets.SERVICE_NAME }}:latest

      # 5. Deploy Container to Cloud Run
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ secrets.SERVICE_NAME }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPO }}/${{ secrets.SERVICE_NAME }}:${{ github.sha }}
          
          # Environment variables for execution
          env_vars: |
            GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
            GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}
            FIRESTORE_DATABASE=${{ secrets.FIRESTORE_DATABASE }}
            GEMINI_MODEL=${{ secrets.GEMINI_MODEL }}
            IMAGEN_MODEL=${{ secrets.IMAGEN_MODEL }}
            NODE_ENV=production

          # Secure secrets injection from Secret Manager
          secrets: |
            GEMINI_API_KEY=GEMINI_API_KEY:latest

          # Run as the deployer SA so it has Firestore + GCS access at runtime
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # 6. Output Deployment URL
      - name: Show Deployment URL
        run: |
          echo "Application successfully deployed to: ${{ steps.deploy.outputs.url }}"
